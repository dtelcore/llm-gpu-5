[pytest]
# Pytest configuration for KepleGPT test suite

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    gpu: Test requires GPU (CUDA)
    slow: Test takes significant time to run
    integration: Integration test combining multiple modules
    e2e: End-to-end test of full system
    cpu: CPU-only test

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test paths
testpaths = test

# Minimum Python version
minversion = 3.8

# Timeout (optional)
# timeout = 300

# Coverage options (if using pytest-cov)
# --cov=src
# --cov-report=html
# --cov-report=term-missing
